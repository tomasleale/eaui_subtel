created_at: 2026-05-07T17:32:26.474695
enabled: true

agents:
  product:
    name: Product Agent
    description: Gather requirements and define product specifications
    path: ./product

  specs:
    name: Specifications Agent
    description: Create detailed technical specifications from requirements
    path: ./specs

  backend:
    name: Backend Standards
    description: Backend architecture, patterns, and coding standards
    path: ./standards/backend

  frontend:
    name: Frontend Standards
    description: Frontend architecture, patterns, and coding standards
    path: ./standards/frontend

  global:
    name: Global Standards
    description: Cross-cutting concerns, security, testing, deployment
    path: ./standards/global

  testing:
    name: Testing Standards
    description: Testing strategies, unit/integration/e2e guidelines
    path: ./standards/testing

workflows:
  feature_development:
    - gather_requirements (product agent)
    - create_specifications (specs agent)
    - review_standards (backend/frontend/global agents)
    - implement_feature (implementation agent)
    - test_feature (testing agent)
    - deploy_feature (deployment agent)
