<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAUI Subtel Knowledge Graph</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #f5f5f5; }
        #container { display: flex; height: 100vh; }
        #graph { flex: 1; background: white; }
        #sidebar { width: 320px; background: #fff; border-left: 1px solid #ddd; overflow-y: auto; padding: 20px; box-shadow: -2px 0 4px rgba(0,0,0,0.05); }
        h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #333; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .stat { }
        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 20px; font-weight: 700; color: #0066cc; }
        .node-list { }
        .node-item { padding: 8px; margin: 4px 0; background: #f9f9f9; border-left: 3px solid #0066cc; cursor: pointer; font-size: 12px; border-radius: 2px; transition: all 0.2s; }
        .node-item:hover { background: #f0f4ff; border-left-color: #0099ff; }
        .node-item .label { font-weight: 500; color: #333; }
        .node-item .type { font-size: 10px; color: #999; text-transform: uppercase; margin-top: 2px; }
        .edge-list { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .edge-item { padding: 6px; margin: 2px 0; background: #f9f9f9; font-size: 11px; border-radius: 2px; }
        .edge-item .source { color: #0066cc; font-weight: 500; }
        .edge-item .arrow { color: #999; }
        .edge-item .target { color: #0066cc; font-weight: 500; }
        .edge-item .relation { color: #666; font-size: 10px; margin-top: 2px; }
        .legend { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; font-size: 11px; }
        .legend-item { margin: 6px 0; display: flex; align-items: center; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .controls { padding: 15px; background: #f9f9f9; border-bottom: 1px solid #ddd; }
        button { padding: 6px 12px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        button:hover { background: #0052a3; }
        .warning { background: #fff3cd; border: 1px solid #ffc107; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 12px; color: #856404; }
    </style>
</head>
<body>
    <div id="container">
        <div id="graph"></div>
        <div id="sidebar">
            <div class="controls">
                <button onclick="resetGraph()">Reset View</button>
            </div>
            <div class="warning">Small corpus (539 words). Notebooks not detected in default patterns.</div>
            <h2>Graph Stats</h2>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Nodes</div>
                    <div class="stat-value">12</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Edges</div>
                    <div class="stat-value">13</div>
                </div>
            </div>
            <h2>Concepts & Tools</h2>
            <div class="node-list" id="nodeList"></div>
            <div class="legend">
                <h3 style="font-size: 11px; margin-bottom: 8px;">Node Types</h3>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff6b6b;"></div>
                    <span>Concept</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ecdc4;"></div>
                    <span>Tool</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #45b7d1;"></div>
                    <span>Method</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f9ca24;"></div>
                    <span>Document</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const graphData = {
            "nodes": [{"id":"eaui_survey","label":"EAUI 2026 Survey","type":"concept","description":"Encuesta de Acceso y Uso de Internet — telecommunications survey data","source_file":"CLAUDE.md"},{"id":"eaui_v3_notebook","label":"eaui2026_v3.ipynb","type":"document","description":"Latest version, main processing pipeline","source_file":"CLAUDE.md"},{"id":"gse_derivation","label":"GSE Derivation","type":"method","description":"Calculates derived socioeconomic variables from education and occupation","source_file":"CLAUDE.md","rationale":"Required to segment survey respondents by socioeconomic status"},{"id":"pyreadstat_lib","label":"pyreadstat","type":"tool","description":"Python library for reading SPSS .sav files","source_file":"CLAUDE.md"},{"id":"pandas_lib","label":"pandas","type":"tool","description":"Data manipulation and analysis library","source_file":"CLAUDE.md"},{"id":"spss_format","label":"SPSS Format (.sav)","type":"concept","description":"Statistical Package for Social Sciences binary format","source_file":"CLAUDE.md"},{"id":"data_dict","label":"diccionario_variables.csv","type":"document","description":"Data dictionary defining all columns and variable properties","source_file":"CLAUDE.md"},{"id":"informe_final","label":"informe_final.pdf","type":"document","description":"Final analysis report output","source_file":"CLAUDE.md"},{"id":"data_sav","label":"/data/sav/","type":"concept","description":"Directory containing SPSS format survey data (2008-2026)","source_file":"CLAUDE.md"},{"id":"jupyter_tool","label":"Jupyter","type":"tool","description":"Interactive notebook environment for data processing","source_file":"CLAUDE.md"},{"id":"text_normalize","label":"Text Normalization","type":"method","description":"Normalize and clean text using re and unicodedata","source_file":"CLAUDE.md"},{"id":"variable_recoding","label":"Variable Recoding","type":"method","description":"Recode survey variables for analysis","source_file":"CLAUDE.md"}],
            "edges": [{"source":"eaui_survey","target":"eaui_v3_notebook","label":"processed by","type":"uses","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Survey data is processed in the main notebook"},{"source":"eaui_v3_notebook","target":"pyreadstat_lib","label":"imports","type":"imports","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Notebook uses pyreadstat to read SPSS files"},{"source":"eaui_v3_notebook","target":"pandas_lib","label":"imports","type":"imports","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Notebook uses pandas for data manipulation"},{"source":"eaui_v3_notebook","target":"jupyter_tool","label":"runs in","type":"uses","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Primary work is done in Jupyter notebook environment"},{"source":"pyreadstat_lib","target":"spss_format","label":"reads","type":"uses","relation_type":"EXTRACTED","confidence_score":1.0,"description":"pyreadstat library reads SPSS .sav files"},{"source":"eaui_v3_notebook","target":"gse_derivation","label":"contains","type":"implements","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Notebook implements GSE socioeconomic calculation"},{"source":"eaui_v3_notebook","target":"variable_recoding","label":"implements","type":"implements","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Notebook contains variable recoding logic"},{"source":"eaui_v3_notebook","target":"text_normalize","label":"uses","type":"implements","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Notebook normalizes text with re and unicodedata"},{"source":"data_sav","target":"spss_format","label":"contains","type":"uses","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Data directory contains SPSS format files"},{"source":"eaui_v3_notebook","target":"data_sav","label":"loads from","type":"uses","relation_type":"EXTRACTED","confidence_score":1.0,"description":"Notebook loads raw data from SPSS files"},{"source":"eaui_v3_notebook","target":"data_dict","label":"references","type":"cites","relation_type":"INFERRED","confidence_score":0.85,"description":"Notebook uses data dictionary for column definitions"},{"source":"eaui_v3_notebook","target":"informe_final","label":"generates","type":"uses","relation_type":"INFERRED","confidence_score":0.8,"description":"Processed data flows to final report generation"},{"source":"variable_recoding","target":"gse_derivation","label":"includes","type":"semantically_similar_to","relation_type":"INFERRED","confidence_score":0.7,"description":"GSE derivation is a specific case of variable recoding"}]
        };

        const nodeTypeColors = {
            'concept': '#ff6b6b',
            'tool': '#4ecdc4',
            'method': '#45b7d1',
            'document': '#f9ca24'
        };

        const nodes = new vis.DataSet(graphData.nodes.map(n => ({
            id: n.id,
            label: n.label,
            title: n.description || '',
            color: nodeTypeColors[n.type] || '#ccc',
            size: 25,
            font: { size: 12, color: '#000' }
        })));

        const edges = new vis.DataSet(graphData.edges.map(e => ({
            from: e.source,
            to: e.target,
            label: e.label,
            title: `${e.label} (${e.relation_type}, confidence: ${e.confidence_score})`,
            color: e.relation_type === 'EXTRACTED' ? '#333' : e.relation_type === 'AMBIGUOUS' ? '#999' : '#ccc',
            dashes: e.relation_type === 'INFERRED',
            font: { size: 10 }
        })));

        const container = document.getElementById('graph');
        const data = { nodes, edges };
        const options = {
            physics: {
                enabled: true,
                stabilization: { iterations: 200 },
                forceAtlas2Based: { gravitationalConstant: -60 },
                maxVelocity: 50
            },
            layout: { randomSeed: 42 }
        };

        const network = new vis.Network(container, data, options);

        // Populate sidebar
        const nodeList = document.getElementById('nodeList');
        graphData.nodes.forEach(n => {
            const div = document.createElement('div');
            div.className = 'node-item';
            div.innerHTML = `<div class="label">${n.label}</div><div class="type">${n.type}</div>`;
            div.onclick = () => {
                network.focus(n.id, { scale: 1.5, animation: true });
                network.selectNodes([n.id]);
            };
            nodeList.appendChild(div);
        });

        function resetGraph() {
            network.fit({ animation: true });
            network.unselectAll();
        }

        window.addEventListener('load', () => setTimeout(() => network.fit({ animation: true }), 100));
    </script>
</body>
</html>
